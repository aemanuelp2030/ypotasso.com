<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YPOTASSO</title>
<meta property="og:title" content="YPOTASSO">
<meta property="og:description" content="For me to win everyone must have lost. There can only be one.">
<meta property="og:image" content="https://payan.org/payan-logo.png">
<meta property="og:url" content="https://ypotasso.com">
<meta property="og:type" content="website">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: Chicago, Geneva, Monaco, "Courier New", monospace;
    font-size: 18px;
    line-height: 1.4;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .wrap {
    max-width: 800px;
    padding: 40px;
  }
  .main {
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .phrase {
    font-size: 2.2rem;
    margin: 0;
    color: #fff;
    white-space: pre-wrap;
    overflow: hidden;
    border-right: .15em solid #fff;
    animation: blink-caret .75s step-end infinite;
  }
  .sub {
    font-size: 1.4rem;
    margin-top: 20px;
    color: #fff;
    opacity: 0;
  }
  @keyframes blink-caret {
    from, to { border-color: transparent }
    50% { border-color: #fff; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="main">
    <div class="phrase" id="phrase"></div>
    <div class="sub" id="sub">THERE CAN ONLY BE ONE</div>
  </div>
</div>

<script>
  const phraseText = "FOR ME TO WIN\nEVERYONE MUST HAVE LOST";
  const subText = document.getElementById('sub');
  const phraseEl = document.getElementById('phrase');
  let i = 0;

  function typeWriter() {
    if (i < phraseText.length) {
      phraseEl.textContent += phraseText.charAt(i);
      i++;
      setTimeout(typeWriter, 80); // speed: 80ms per letter — adjust if too slow/fast
    } else {
      phraseEl.style.borderRight = 'none'; // kill cursor after done
      subText.style.opacity = 1;
      subText.style.transition = 'opacity 1s';
    }
  }

  typeWriter();
</script>
</body>
</html>
