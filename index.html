<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YPOTASSO</title>
<meta property="og:title" content="YPOTASSO">
<meta property="og:description" content="For me to win everyone must have lost. There can only be one.">
<meta property="og:image" content="https://payan.org/payan-logo.png">
<meta property="og:url" content="https://ypotasso.com">
<meta property="og:type" content="website">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: Chicago, Geneva, Monaco, "Courier New", monospace;
    font-size: 18px;
    line-height: 1.4;
    overflow: hidden;
  }
  .wrap {
    position: relative;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    box-sizing: border-box;
  }
  .main {
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 2;
  }
  .phrase {
    font-size: 2.2rem;
    margin: 0;
    color: #fff;
    white-space: pre-wrap;
    overflow: hidden;
    border-right: .15em solid #fff;
    animation: blink-caret .75s step-end infinite;
  }
  .sub {
    font-size: 1.4rem;
    margin-top: 20px;
    color: #fff;
    opacity: 0;
  }
  @keyframes blink-caret {
    from, to { border-color: transparent }
    50% { border-color: #fff; }
  }
  .kill-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 0;
    background: #EE4B2B;
    color: #000;
    font-size: 4rem;
    font-weight: bold;
    text-align: center;
    line-height: 1;
    overflow: hidden;
    z-index: 1;
    transition: height 2s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }
  .kill-fill {
    position: absolute;
    inset: 0;
    background: #EE4B2B;
    color: #000;
    font-size: 2rem;
    opacity: 0;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    overflow: hidden;
    transition: opacity 1s;
  }
  .kill-text {
    animation: kill-scroll 20s linear infinite;
  }
  @keyframes kill-scroll {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="main">
    <div class="phrase" id="phrase"></div>
    <div class="sub" id="sub">THERE CAN ONLY BE ONE</div>
  </div>

  <div class="kill-bar" id="killBar"></div>
  <div class="kill-fill" id="killFill">
    <div class="kill-text">KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL KILL</div>
  </div>
</div>

<script>
  const phraseText = "FOR ME TO WIN\nEVERYONE MUST HAVE LOST";
  const phraseEl = document.getElementById('phrase');
  const subEl = document.getElementById('sub');
  const killBar = document.getElementById('killBar');
  const killFill = document.getElementById('killFill');
  let i = 0;

  function typeWriter() {
    if (i < phraseText.length) {
      phraseEl.textContent += phraseText.charAt(i);
      i++;
      setTimeout(typeWriter, 80);
    } else {
      phraseEl.style.borderRight = 'none';
      subEl.style.opacity = 1;
      subEl.style.transition = 'opacity 1s';

      // Trigger kill takeover after phrase done
      setTimeout(() => {
        killBar.textContent = "KILL";
        killBar.style.height = '100%';
        setTimeout(() => {
          killFill.style.opacity = 1;
        }, 1500);
      }, 2000);
    }
  }

  typeWriter();
</script>
</body>
</html>
