<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YPOTASSO</title>
<meta property="og:title" content="YPOTASSO">
<meta property="og:description" content="For me to win everyone must have lost. There can only be one.">
<meta property="og:image" content="https://payan.org/payan-logo.png">
<meta property="og:url" content="https://ypotasso.com">
<meta property="og:type" content="website">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: Chicago, Geneva, Monaco, "Courier New", monospace;
    font-size: 18px;
    line-height: 1.4;
    overflow: hidden;
  }
  .wrap {
    position: relative;
    height: 100%;
    padding: 40px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 2;
  }
  .main {
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .phrase {
    font-size: 2.2rem;
    margin: 0;
    color: #fff;
    white-space: pre-wrap;
    overflow: hidden;
    border-right: .15em solid #fff;
    animation: blink-caret .75s step-end infinite;
  }
  .sub {
    font-size: 1.4rem;
    margin-top: 20px;
    color: #fff;
    opacity: 0;
  }
  @keyframes blink-caret {
    from, to { border-color: transparent }
    50% { border-color: #fff; }
  }
  .kill-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    grid-auto-rows: 40px;
    opacity: 0;
    transition: opacity 1s;
    overflow: hidden;
  }
  .kill-cell {
    color: #EE4B2B;
    font-size: 1.8rem;
    font-weight: bold;
    text-align: center;
    line-height: 40px;
    white-space: nowrap;
    opacity: 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="main">
    <div class="phrase" id="phrase"></div>
    <div class="sub" id="sub">THERE CAN ONLY BE ONE</div>
  </div>

  <div class="kill-grid" id="killGrid"></div>
</div>

<script>
  const phraseText = "FOR ME TO WIN\nEVERYONE MUST HAVE LOST";
  const phraseEl = document.getElementById('phrase');
  const subEl = document.getElementById('sub');
  const killGrid = document.getElementById('killGrid');
  let i = 0;

  // Create enough cells to fill screen (adjust multiplier if needed)
  const cellCount = 2000; // overkill to cover any screen
  for (let j = 0; j < cellCount; j++) {
    const cell = document.createElement('div');
    cell.className = 'kill-cell';
    cell.textContent = 'WIN';
    killGrid.appendChild(cell);
  }

  function typeWriter() {
    if (i < phraseText.length) {
      phraseEl.textContent += phraseText.charAt(i);
      i++;
      setTimeout(typeWriter, 80);
    } else {
      phraseEl.style.borderRight = 'none';
      subEl.style.opacity = 1;
      subEl.style.transition = 'opacity 1s';

      // Start KILL flood after phrase
      setTimeout(() => {
        killGrid.style.opacity = 1;
        let cellIndex = 0;
        const cells = document.querySelectorAll('.kill-cell');

        function fillNext() {
          if (cellIndex < cells.length) {
            cells[cellIndex].style.opacity = 1;
            cellIndex++;
            setTimeout(fillNext, 20); // speed of flood — lower = faster
          }
        }

        fillNext();
      }, 2000);
    }
  }

  typeWriter();
</script>
</body>
</html>
